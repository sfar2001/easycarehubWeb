# ============================================================
#  Tally → Claude → Draft PR
#
#  Fetches new submissions from the EasyCareHub Tally form, asks
#  Claude (Sonnet 4.6) to propose a code change, and opens a DRAFT
#  pull request for each. Your PR merge is the gate before Netlify
#  redeploys.
#
#  Trigger:  manual only — Actions tab → "Feedback → PR" → Run.
#  Secrets:  TALLY_API_KEY, ANTHROPIC_API_KEY
# ============================================================

name: Feedback → PR

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max submissions to process this run (0 = all)"
        required: false
        default: "5"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: feedback-to-pr
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install script dependencies
        working-directory: scripts/feedback-to-pr
        run: npm install --no-audit --no-fund

      - name: Configure git identity
        run: |
          git config user.name  "easycarehub-bot"
          git config user.email "easycarehub-bot@users.noreply.github.com"

      - name: Run feedback bot
        working-directory: scripts/feedback-to-pr
        env:
          # Pipeline inputs
          TALLY_API_KEY:      ${{ secrets.TALLY_API_KEY }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          REPO:               ${{ github.repository }}
          LIMIT:              ${{ inputs.limit }}
          TALLY_FORM_ID:      "WOp6Qv"

          # LLM provider (OpenAI-compatible). Defaults to OpenRouter.
          # To override provider/model without touching code, set these
          # repository variables (Settings → Actions → Variables):
          #   LLM_BASE_URL     e.g. https://openrouter.ai/api/v1   (default)
          #                    or  https://api.openai.com/v1
          #   LLM_MODEL        e.g. nousresearch/hermes-3-llama-3.1-405b:free
          #                    or  anthropic/claude-sonnet-4.5
          #                    or  gpt-4o-mini  (if using OpenAI directly)
          #   LLM_API_KEY_ENV  which env var holds the key (default OPENROUTER_API_KEY)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          LLM_BASE_URL:       ${{ vars.LLM_BASE_URL }}
          LLM_MODEL:          ${{ vars.LLM_MODEL }}
          LLM_API_KEY_ENV:    ${{ vars.LLM_API_KEY_ENV }}
        run: node index.mjs
